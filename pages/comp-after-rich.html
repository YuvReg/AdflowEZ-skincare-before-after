<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mosswell — premium gallery card (after, rich)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

  :root{ --paper:#f6f2ea; --ink:#2b2722; --muted:#7c7568; --brass:#9b6a2f; --line:#e7e0d4; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; width:100vw; height:100vh; overflow:hidden; }
  body{
    background: radial-gradient(125% 110% at 82% 4%, #fbf8f2 0%, var(--paper) 58%, #ece5d8 100%);
    color:var(--ink); font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .card{ width:100vw; height:100vh; padding:22px; display:flex; flex-direction:column; }

  .brand{ display:flex; align-items:center; justify-content:center; gap:10px; flex:0 0 auto; }
  .brand img{ height:23px; width:auto; }

  .main{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; gap:12px; margin-top:12px; }

  .gallery{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; gap:8px; }
  .hero-img{ flex:1 1 auto; min-height:0; border-radius:16px; overflow:hidden;
             border:1px solid var(--line); box-shadow:0 18px 36px rgba(60,45,25,.18); }
  .hero-img img{ width:100%; height:100%; object-fit:cover; object-position:50% 32%; display:block; }
  .thumbs{ flex:0 0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .thumbs figure{ margin:0; aspect-ratio:1; border-radius:11px; overflow:hidden; border:1px solid var(--line); }
  .thumbs img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }

  .info{ flex:0 0 auto; }
  .kicker{ margin:0 0 5px; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--brass); font-weight:600; }
  .title{ margin:0; font-family:'Playfair Display',Georgia,serif; font-weight:600; line-height:.98; font-size:27px; letter-spacing:-.01em; }
  .rating{ display:flex; align-items:center; gap:8px; margin:7px 0 0; color:var(--muted); font-size:13px; }
  .stars{ color:var(--brass); letter-spacing:2px; }
  .buy{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:11px; }
  .price{ font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; }
  .cta{ appearance:none; border:none; cursor:pointer; background:var(--ink); color:#fff; font-family:inherit;
        font-weight:600; font-size:14px; padding:12px 19px; border-radius:999px; display:inline-flex; align-items:center; gap:8px;
        box-shadow:0 10px 24px rgba(43,39,34,.26); }
  .cta svg{ width:16px; height:16px; }

  /* Desktop / landscape (16:9): gallery (hero + vertical thumbs) left, info right. */
  @media (min-width:640px){
    .card{ padding:38px 50px; }
    .brand{ position:absolute; top:28px; left:50%; transform:translateX(-50%); }
    .brand img{ height:27px; }
    .main{ flex-direction:row; align-items:center; gap:34px; margin-top:0; }
    .gallery{ flex:1 1 54%; flex-direction:row; height:82%; gap:10px; }
    .hero-img{ flex:1 1 auto; height:100%; }
    .thumbs{ flex:0 0 96px; grid-template-columns:1fr; grid-auto-rows:1fr; height:100%; }
    .thumbs figure{ aspect-ratio:auto; }
    .info{ flex:1 1 46%; }
    .kicker{ font-size:13px; }
    .title{ font-size:50px; }
    .rating{ font-size:14px; margin-top:10px; }
    .price{ font-size:29px; }
    .cta{ font-size:15px; padding:14px 24px; }
    .buy{ margin-top:20px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><img src="../assets/mosswell-logo.svg" alt="Mosswell"></div>
    <div class="main">
      <div class="gallery">
        <div class="hero-img"><img src="../assets/images/female-model-serum.png" alt="Woman applying Mosswell serum"></div>
        <div class="thumbs">
          <figure><img src="../assets/images/male-model-serum.png" alt="Man using Mosswell serum"></figure>
          <figure><img src="../assets/images/barrier-dew-serum-hero.png" alt="Barrier Dew Serum bottle"></figure>
          <figure><img src="../assets/images/serum-texture-macro.png" alt="Serum texture"></figure>
        </div>
      </div>
      <div class="info">
        <p class="kicker">Barrier support serum</p>
        <h1 class="title">Barrier Dew Serum</h1>
        <div class="rating"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span><span>4.8 from 214 rituals</span></div>
        <div class="buy">
          <span class="price">$48</span>
          <button class="cta" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Add to cart
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
