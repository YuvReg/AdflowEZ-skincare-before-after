<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mosswell — original store card (v4, before)</title>
<style>
  /* Deliberately plain/amateur: system font, flat, generic store layout.
     Same layout skeleton as the AFTER card so the wipe lines up region-for-region. */
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; width:100vw; height:100vh; overflow:hidden; }
  body{ background:#ffffff; color:#222; font-family:Arial,Helvetica,system-ui,sans-serif; }

  .card{ width:100vw; height:100vh; padding:18px; display:flex; flex-direction:column; }

  .brand{ flex:0 0 auto; text-align:center; font-weight:700; font-size:17px; letter-spacing:.02em; color:#333;
          border-bottom:1px solid #e6e6e6; padding-bottom:10px; }

  .main{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; gap:11px; margin-top:11px; }

  .gallery{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; gap:7px; }
  .hero-img{ flex:1 1 auto; min-height:0; background:#fafafa; border:1px solid #e2e2e2; overflow:hidden; }
  .hero-img img{ width:100%; height:100%; object-fit:contain; object-position:center; display:block; }
  .thumbs{ flex:0 0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .thumbs figure{ margin:0; aspect-ratio:1; background:#f3f3f3; border:1px solid #e2e2e2; overflow:hidden; }
  .thumbs img{ width:100%; height:100%; object-fit:cover; display:block; }

  .info{ flex:0 0 auto; }
  .title{ margin:0 0 5px; font-size:19px; font-weight:700; line-height:1.15; }
  .price{ font-size:16px; font-weight:700; margin:0 0 9px; }
  .opts{ display:flex; gap:8px; margin:0 0 9px; }
  .opts select, .opts input{ font-family:inherit; font-size:12.5px; padding:7px 8px; border:1px solid #bbb; border-radius:3px; background:#fff; color:#333; }
  .opts input{ width:46px; }
  .cta{ appearance:none; cursor:pointer; width:100%; background:#111; color:#fff; border:none; font-family:inherit;
        font-weight:700; font-size:13.5px; letter-spacing:.04em; padding:12px 16px; border-radius:2px; text-transform:uppercase; }

  /* Desktop / landscape (1280x670): gallery left, info right (mirrors AFTER). */
  @media (min-width:640px){
    .card{ padding:30px 50px; }
    .brand{ font-size:19px; }
    .main{ flex-direction:row; align-items:center; gap:34px; margin-top:16px; }
    .gallery{ flex:1 1 54%; flex-direction:row; height:82%; gap:9px; align-self:center; }
    .hero-img{ flex:1 1 auto; height:100%; }
    .thumbs{ flex:0 0 96px; grid-template-columns:1fr; grid-auto-rows:1fr; height:100%; }
    .thumbs figure{ aspect-ratio:auto; }
    .info{ flex:1 1 46%; min-width:230px; }
    .title{ font-size:27px; }
    .price{ font-size:20px; }
    .cta{ width:auto; padding:13px 34px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Mosswell</div>
    <div class="main">
      <div class="gallery">
        <div class="hero-img"><img src="../assets/images/starter-serum-before.png" alt="Barrier Dew Serum"></div>
        <div class="thumbs">
          <figure><img src="../assets/images/barrier-dew-serum.png" alt="Serum"></figure>
          <figure><img src="../assets/images/serum-texture.png" alt="Texture"></figure>
          <figure><img src="../assets/images/ritual-shelf.png" alt="Shelf"></figure>
        </div>
      </div>
      <div class="info">
        <h1 class="title">Barrier Dew Serum</h1>
        <p class="price">$48.00</p>
        <div class="opts">
          <select><option>30 ml</option><option>50 ml</option></select>
          <input type="text" value="1">
        </div>
        <button class="cta" type="button">Add to cart</button>
      </div>
    </div>
  </div>
</body>
</html>
