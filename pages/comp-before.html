<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mosswell — original product card (before)</title>
<style>
  /* Deliberately plain/amateur: system font, flat, generic store styling. */
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; width:100vw; height:100vh; overflow:hidden; }
  body{ background:#ffffff; color:#222;
        font-family:Arial,Helvetica,system-ui,sans-serif; }

  .card{ width:100vw; height:100vh; padding:22px; display:flex; flex-direction:column; }

  .brand{ flex:0 0 auto; font-weight:700; font-size:18px; letter-spacing:.02em; color:#333;
          text-align:center; border-bottom:1px solid #e5e5e5; padding-bottom:12px; }

  .main{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; gap:12px; margin-top:14px; }

  .shot{ flex:1 1 auto; min-height:0; background:#f3f3f3; border:1px solid #e0e0e0; overflow:hidden; }
  .shot img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }

  .info{ flex:0 0 auto; }
  .title{ margin:0 0 6px; font-size:21px; font-weight:700; line-height:1.15; }
  .price{ font-size:18px; font-weight:700; margin:0 0 10px; }
  .opts{ display:flex; gap:8px; margin:0 0 10px; }
  .opts select, .opts input{ font-family:inherit; font-size:13px; padding:7px 8px; border:1px solid #bbb;
                             border-radius:3px; background:#fff; color:#333; }
  .opts input{ width:54px; }
  .cta{ appearance:none; cursor:pointer; width:100%; background:#111; color:#fff; border:none;
        font-family:inherit; font-weight:700; font-size:14px; letter-spacing:.04em; padding:13px 16px;
        border-radius:2px; text-transform:uppercase; }

  /* Desktop / landscape (16:9): image left, info right. */
  @media (min-width:640px){
    .card{ padding:34px 44px; }
    .brand{ font-size:20px; }
    .main{ flex-direction:row; align-items:center; justify-content:center; gap:48px; margin-top:18px; }
    .shot{ flex:0 0 44%; height:82%; align-self:center; }
    .info{ flex:0 0 auto; min-width:230px; }
    .title{ font-size:30px; }
    .price{ font-size:22px; }
    .cta{ width:auto; padding:13px 34px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Mosswell</div>
    <div class="main">
      <div class="shot">
        <img src="../assets/images/starter-serum-before.png" alt="Barrier Dew Serum">
      </div>
      <div class="info">
        <h1 class="title">Barrier Dew Serum</h1>
        <p class="price">$48.00</p>
        <div class="opts">
          <select><option>30 ml</option><option>50 ml</option></select>
          <input type="text" value="1">
        </div>
        <button class="cta" type="button">Add to cart</button>
      </div>
    </div>
  </div>
</body>
</html>
